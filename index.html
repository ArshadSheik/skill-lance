<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- Meta-refresh redirect: 0-second delay sends the browser
       straight to tutorial.html without any visible flash. -->
  <meta http-equiv="refresh" content="0; url=./tutorial.html">

  <title>SkillLance</title>
</head>
<body>
  <!-- Fallback anchor for browsers/bots that ignore meta-refresh
       (e.g. search engine crawlers, curl, older user agents). -->
  <p>Redirecting to <a href="./tutorial.html">SkillLance</a>…</p>
</body>
</html>
